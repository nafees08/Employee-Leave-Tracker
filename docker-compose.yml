# Compose file format v2 (no top-level `version` key required in Compose V2)
name: leave-tracker

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leave_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      DB_PATH: /app/data/leave_tracker.db
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - sqlite_data:/app/data
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: leave_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
